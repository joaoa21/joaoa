<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — João Alberto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body>
  <main class="error-page">
    <a class="nav-logo error-logo" href="/">
      João Alberto<span class="accent">.</span>

      <span class="error-code">// 404</span>

      <h1 class="error-title">

      <div class="error-actions">
        <a href="/" class="btn-primary">
          Voltar para início
        </a>
      </div>
